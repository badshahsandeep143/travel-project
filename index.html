<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Recommendation System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        nav { display: flex; justify-content: space-between; align-items: center; background-color: #333; padding: 15px 20px; color: white; }
        nav .nav-links a { color: white; margin-right: 15px; text-decoration: none; font-weight: bold; }
        .search-section { display: flex; gap: 10px; }
        .search-section input { padding: 8px; width: 200px; border-radius: 4px; border: none; }
        .search-section button { padding: 8px 15px; cursor: pointer; background-color: #5cb85c; color: white; border: none; border-radius: 4px; font-weight: bold; }
        #clearBtn { background-color: #d9534f; }
        main { padding: 20px; text-align: center; }
        #results { display: flex; justify-content: center; gap: 30px; margin-top: 30px; flex-wrap: wrap; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 15px; width: 350px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 5px; background-color: #f0f0f0; }
        .card h2 { margin: 10px 0 5px 0; color: #333; }
        .card p { color: #555; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact Us</a>
        </div>
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Enter destination...">
            <button id="searchBtn" onclick="searchDestination()">Search</button>
            <button id="clearBtn" onclick="clearResults()">Clear</button>
        </div>
    </nav>

    <main>
        <h1>Welcome to Travel Recommendation System</h1>
        <p>Type "beach", "temple", or "country" to find the best places!</p>
        <div id="results"></div>
    </main>

    <script>
        const travelData = {
            beaches: [
                { name: "Bora Bora", imageUrl: "https://upload.wikimedia.org/wikipedia/commons/6/6d/Bora_Bora_from_air.jpg", description: "Relax on the beautiful white sand beaches." },
                { name: "Maldives", imageUrl: "https://upload.wikimedia.org/wikipedia/commons/b/be/Maldives_-_tropical_paradise.jpg", description: "Crystal clear waters and stunning resorts." }
            ],
            temples: [
                { name: "Angkor Wat", imageUrl: "https://upload.wikimedia.org/wikipedia/commons/4/44/Ankor_Wat_temple.jpg", description: "A magnificent ancient temple complex." },
                { name: "Taj Mahal", imageUrl: "https://upload.wikimedia.org/wikipedia/commons/c/c8/Taj_Mahal_in_March_2004.jpg", description: "A beautiful symbol of love and historic architecture." }
            ],
            countries: [
                { name: "Japan", imageUrl: "https://upload.wikimedia.org/wikipedia/commons/b/b2/Skyscrapers_of_Shinjuku_2009_January.jpg", description: "Explore the mix of modern cities and traditional culture." },
                { name: "France", imageUrl: "https://upload.wikimedia.org/wikipedia/commons/a/a8/Tour_Eiffel_Wikimedia_Commons.jpg", description: "Discover the beautiful city of Paris and the Eiffel Tower." }
            ]
        };

        function searchDestination() {
            let input = document.getElementById('searchInput').value.toLowerCase().trim();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = ""; 

            let dataToShow = [];

            if (input === 'beach' || input === 'beaches') {
                dataToShow = travelData.beaches;
            } else if (input === 'temple' || input === 'temples') {
                dataToShow = travelData.temples;
            } else if (input === 'country' || input === 'countries') {
                dataToShow = travelData.countries;
            } else {
                resultsDiv.innerHTML = "<p style='color:red; font-weight:bold;'>No results found. Please check spelling!</p>";
                return;
            }

            dataToShow.forEach(item => {
                resultsDiv.innerHTML += `
                    <div class="card">
                        <img src="${item.imageUrl}" alt="${item.name}">
                        <h2>${item.name}</h2>
                        <p>${item.description}</p>
                    </div>
                `;
            });
        }

        function clearResults() {
            document.getElementById('searchInput').value = "";
            document.getElementById('results').innerHTML = "";
        }
    </script>

</body>
</html>
