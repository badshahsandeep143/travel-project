<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Recommendation</title>
    <style>
        /* Thodi basic styling taaki navbar achha dikhe */
        nav { display: flex; justify-content: space-between; background-color: #333; padding: 15px; color: white; }
        nav a { color: white; margin: 0 10px; text-decoration: none; }
        .search-container { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <nav>
        <div class="links">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="contact.html">Contact Us</a>
        </div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search destination...">
            <button id="searchBtn" onclick="searchDestination()">Search</button>
            <button id="clearBtn" onclick="clearResults()">Clear</button>
        </div>
    </nav>

    <main style="padding: 20px;">
        <h1>Welcome to Travel Recommendation System</h1>
        <p>Explore the best beaches, majestic temples, and beautiful countries for your next vacation.</p>
        
        <div id="results"></div>
    </main>

</body>
<script>
        // Yahan humne pehle se kuch jagahon ka data aur photos (links) save kar li hain
        const travelData = {
            beaches: [
                { name: "Bora Bora, French Polynesia", imageUrl: "https://images.unsplash.com/photo-1502003148287-a82ef80a6abc?w=400", description: "Relax on the beautiful white sand beaches." },
                { name: "Maldives", imageUrl: "https://images.unsplash.com/photo-1514282401047-d79a71a590e8?w=400", description: "Crystal clear waters and stunning resorts." }
            ],
            temples: [
                { name: "Angkor Wat, Cambodia", imageUrl: "https://images.unsplash.com/photo-1600803561919-4828ff7b713b?w=400", description: "A magnificent ancient temple complex." },
                { name: "Taj Mahal, India", imageUrl: "https://images.unsplash.com/photo-1564507592224-2c06130dddd4?w=400", description: "A beautiful symbol of love and historic architecture." }
            ],
            countries: [
                { name: "Japan", imageUrl: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=400", description: "Explore the mix of modern cities and traditional culture." },
                { name: "Australia", imageUrl: "https://images.unsplash.com/photo-1523482580672-f109ba8cb9be?w=400", description: "Discover the Outback and beautiful coastlines." }
            ]
        };

        // Search Button dabane par yeh function chalega
        function searchDestination() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = ""; // Pehle ke results hata dega

            let dataToShow = [];

            // Check karega user ne kya type kiya hai
            if (input.includes('beach')) {
                dataToShow = travelData.beaches;
            } else if (input.includes('temple')) {
                dataToShow = travelData.temples;
            } else if (input.includes('country') || input.includes('countries')) {
                dataToShow = travelData.countries;
            } else {
                resultsDiv.innerHTML = "<p>No results found. Please search for 'beach', 'temple', or 'country'.</p>";
                return;
            }

            // Screen par results aur photos dikhayega
            dataToShow.forEach(item => {
                resultsDiv.innerHTML += `
                    <div style="border: 1px solid #ccc; padding: 15px; margin: 15px 0; border-radius: 8px; max-width: 450px;">
                        <h2 style="margin-top: 0;">${item.name}</h2>
                        <img src="${item.imageUrl}" alt="${item.name}" style="width: 100%; height: auto; border-radius: 5px;">
                        <p>${item.description}</p>
                    </div>
                `;
            });
        }

        // Clear Button dabane par yeh function chalega
        function clearResults() {
            document.getElementById('searchInput').value = "";
            document.getElementById('results').innerHTML = "";
        }
    </script>
</html>
